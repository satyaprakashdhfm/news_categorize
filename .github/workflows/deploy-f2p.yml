name: Deploy f2p to VM (SSM)

on:
  push:
    branches:
      - f2p
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        env:
          INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          APP_DIR: /home/ubuntu/news_categorize
          BRANCH: f2p
        run: |
          DEPLOY_COMMAND="cd ${APP_DIR} && chmod +x scripts/deploy_vm.sh && APP_DIR=${APP_DIR} BRANCH=${BRANCH} bash scripts/deploy_vm.sh"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy f2p via GitHub Actions" \
            --parameters "{\"commands\":[\"$DEPLOY_COMMAND\"]}" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command id: $COMMAND_ID"
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          echo "SSM command status: $STATUS"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardOutputContent' --output text

          if [[ "$STATUS" != "Success" ]]; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --query 'StandardErrorContent' --output text
            exit 1
          fi
