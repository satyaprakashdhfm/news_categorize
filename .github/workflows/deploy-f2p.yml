name: Deploy f2p to VM

on:
  push:
    branches:
      - f2p
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Trust VM host key
        run: |
          ssh-keyscan -p "${{ secrets.VM_PORT || 22 }}" -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to VM
        env:
          VM_HOST: ${{ secrets.VM_HOST }}
          VM_USER: ${{ secrets.VM_USER }}
          VM_PORT: ${{ secrets.VM_PORT || 22 }}
          APP_DIR: /home/ubuntu/news_categorize
          BRANCH: f2p
        run: |
          ssh -p "$VM_PORT" "$VM_USER@$VM_HOST" "cd '$APP_DIR' && chmod +x scripts/deploy_vm.sh && APP_DIR='$APP_DIR' BRANCH='$BRANCH' bash scripts/deploy_vm.sh"
